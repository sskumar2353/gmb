spring.application.name=green-miles-backend

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/greenmilesbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:greenmiles-change-this-to-256-bit-secret-greenmiles}
app.security.jwt.expiration-minutes=${JWT_EXP_MINUTES:120}
app.security.jwt.refresh-expiration-minutes=${JWT_REFRESH_EXP_MINUTES:10080}
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:admin@123}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.rate-limit.auth.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:30}
app.security.rate-limit.auth.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.lockout.max-attempts=${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
app.security.lockout.duration-minutes=${AUTH_LOCKOUT_DURATION_MINUTES:15}
app.security.cleanup.fixed-delay-ms=${AUTH_CLEANUP_FIXED_DELAY_MS:300000}
