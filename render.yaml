services:
  - type: web
    name: gmb-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: ./gradlew clean bootJar
    startCommand: java -jar build/libs/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP_MINUTES
        value: "120"
      - key: JWT_REFRESH_EXP_MINUTES
        value: "10080"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: AUTH_LOCKOUT_MAX_ATTEMPTS
        value: "5"
      - key: AUTH_LOCKOUT_DURATION_MINUTES
        value: "15"
      - key: AUTH_CLEANUP_FIXED_DELAY_MS
        value: "300000"

  - type: web
    name: gmb-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
